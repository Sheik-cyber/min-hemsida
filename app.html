<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Team Resolve</title>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getDatabase, ref, push, onValue, remove, set } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";
  const firebaseConfig = {
    apiKey: "AIzaSyCadWqz9yjUYVuePpn_Rs7KfsMA90SyAlY",
    authDomain: "team-resolve-app.firebaseapp.com",
    databaseURL: "https://team-resolve-app-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "team-resolve-app",
    storageBucket: "team-resolve-app.firebasestorage.app",
    messagingSenderId: "785507782953",
    appId: "1:785507782953:web:8ce19b3b95e9725c336738"
  };
  try {
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    window._db=db;window._ref=ref;window._push=push;window._onValue=onValue;window._remove=remove;window._set=set;
    window._FBR=true;window.dispatchEvent(new Event('fbReady'));
  } catch(e){window._FBR=false;}
</script>

<style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600;700&display=swap');
:root{
  --or:#FF6200;--bg:#080808;--s1:#111;--s2:#181818;--s3:#222;--s4:#2a2a2a;
  --bd:rgba(255,255,255,0.07);--tx:#f0f0f0;--mu:#555;--gr:#22c55e;--re:#ef4444;--bl:#3b82f6;
  --ung:#FF6200;--fbl:#3b82f6;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--tx);font-family:'DM Sans',sans-serif;min-height:100vh;overflow-x:hidden}
button{font-family:'DM Sans',sans-serif;cursor:pointer}

/* LOGIN */
#ls{min-height:100vh;display:flex;align-items:center;justify-content:center;background:radial-gradient(ellipse at 30% 50%,#1a0800,var(--bg) 65%)}
.lbox{text-align:center;padding:20px;max-width:300px;width:100%}
.llogo{font-family:'Bebas Neue',sans-serif;font-size:48px;color:var(--or);letter-spacing:4px;line-height:1}
.llogo span{color:var(--tx)}
.lsub{color:var(--mu);font-size:11px;letter-spacing:2px;text-transform:uppercase;margin:4px 0 36px}
.ng{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.nb{background:var(--s2);border:1px solid var(--bd);color:var(--tx);padding:20px;border-radius:12px;font-size:17px;font-weight:700;transition:all .2s}
.nb:active{border-color:var(--or);color:var(--or)}

/* STAR FAVORITE */
.star-btn{background:transparent;border:none;font-size:16px;cursor:pointer;padding:2px 4px;transition:transform .2s;color:var(--mu)}
.star-btn.active{color:var(--or)}
.star-btn:active{transform:scale(1.3)}

/* ANTECKNINGSBANNER */
.note-banner{background:var(--or);color:#fff;padding:10px 14px;border-radius:9px;margin-bottom:14px;display:flex;align-items:center;gap:10px}
.nb-icon{font-size:22px}
.nb-content{flex:1}
.nb-name{font-family:'Bebas Neue',sans-serif;font-size:14px;letter-spacing:1px}
.nb-text{font-size:12px;font-weight:600}

/* PRINT */
@media print{
  #timerOv,#shareOv,.topbar,.tabs,#quote-screen{display:none!important}
  body{background:#fff;color:#000}
  .page{display:block!important;padding:10px}
  .oc{background:#fff;border:1px solid #ddd;break-inside:avoid}
  .ob{display:block!important}
  .oacts,.bsave,.blib,.bcust,.oarr{display:none!important}
  .on{background:#FF6200}
  .deth h2{color:#000}
  .dov{background:#fff;border:1px solid #ddd}
}

/* QUOTE SCREEN */
#quote-screen{position:fixed;inset:0;background:#080808;display:none;flex-direction:column;align-items:center;justify-content:center;padding:40px 32px;z-index:999;text-align:center}
#quote-screen.show{display:flex}
.qs-animal{font-size:64px;margin-bottom:24px;animation:fadeUp .6s ease}
.qs-name{font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:4px;color:var(--or);margin-bottom:32px;animation:fadeUp .6s ease .1s both}
.qs-text{font-size:18px;color:var(--tx);line-height:1.7;max-width:340px;font-style:italic;animation:fadeUp .6s ease .2s both}
.qs-bar{width:200px;height:2px;background:var(--s3);border-radius:2px;margin-top:48px;overflow:hidden;animation:fadeUp .4s ease .3s both}
.qs-fill{height:100%;background:var(--or);border-radius:2px;width:0%;transition:width 5s linear}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}

/* APP */
#app{display:none;min-height:100vh}
.topbar{background:var(--s1);border-bottom:1px solid var(--bd);padding:0 14px;height:50px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
.tlogo{font-family:'Bebas Neue',sans-serif;font-size:20px;color:var(--or);letter-spacing:3px}
.tlogo span{color:var(--tx)}
.tr{display:flex;align-items:center;gap:8px}
.uchip{background:rgba(255,98,0,.1);border:1px solid rgba(255,98,0,.3);padding:4px 11px;border-radius:20px;font-size:12px;font-weight:700;color:var(--or)}
.timerbtn{background:var(--s3);border:1px solid var(--bd);color:var(--tx);padding:6px 11px;border-radius:8px;font-size:12px;font-weight:700;transition:all .2s}
.lout{background:transparent;border:none;color:var(--mu);font-size:17px;padding:4px 6px}

.tabs{display:flex;background:var(--s1);border-bottom:1px solid var(--bd);padding:0 12px;position:sticky;top:50px;z-index:40;overflow-x:auto}
.tab{padding:13px 11px;font-size:11px;font-weight:700;letter-spacing:.8px;color:var(--mu);border-bottom:2px solid transparent;transition:all .2s;text-transform:uppercase;white-space:nowrap;flex-shrink:0}
.tab.active{color:var(--or);border-bottom-color:var(--or)}

.page{display:none;padding:14px;max-width:640px;margin:0 auto;padding-bottom:100px}
.page.active{display:block}
.ph h2{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:1px;margin-bottom:2px}
.ph p{color:var(--mu);font-size:12px;margin-bottom:16px}

/* FIELDS & CARD STYLING */
.oc{background:var(--s2);border:1px solid var(--bd);border-radius:11px;margin-bottom:7px;overflow:hidden}
.ot{display:flex;align-items:center;gap:9px;padding:11px 13px;cursor:pointer}
.on{background:var(--or);color:#fff;font-family:'Bebas Neue',sans-serif;font-size:13px;min-width:26px;height:26px;border-radius:5px;display:flex;align-items:center;justify-content:center}
.onm{font-weight:700;font-size:13px;flex:1}
.ob{display:none;padding:0 13px 13px;border-top:1px solid var(--bd)}
.oc.open .ob{display:block}
.odesc{font-size:12px;color:#bbb;line-height:1.6;margin:10px 0 9px}

/* EXTRA INSTRUCTIONS ON CARD */
.extra-ins{margin-top:8px;padding-top:8px;border-top:1px dashed var(--bd)}
.extra-ins label{display:block;font-size:9px;font-weight:700;color:var(--or);text-transform:uppercase;margin-bottom:3px;letter-spacing:1px}
.extra-ins textarea{width:100%;background:var(--bg);border:1px solid var(--bd);border-radius:6px;color:var(--tx);padding:6px 8px;font-size:12px;font-family:inherit;outline:none;resize:none;min-height:40px}

/* SWAP DROPDOWN & QUICK SELECT */
.swap-dd{background:var(--bg);border:1px solid var(--or);border-radius:9px;margin-top:8px;overflow:hidden;max-height:300px;overflow-y:auto}
.qs-header{background:var(--s3);padding:6px 12px;font-size:10px;font-weight:700;color:var(--mu);letter-spacing:1px;text-transform:uppercase}
.swap-item{padding:10px 12px;border-bottom:1px solid var(--bd);cursor:pointer}
.swap-item:active{background:rgba(255,98,0,.1)}
.swap-name{font-weight:700;font-size:12px}

/* MODAL & TOAST */
.mbox{background:var(--s1);border:1px solid var(--bd);border-radius:18px 18px 0 0;width:100%;max-width:640px;padding:20px 16px 36px;max-height:84vh;overflow-y:auto}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--or);color:#fff;padding:10px 20px;border-radius:28px;font-weight:700;font-size:12px;transition:transform .3s;z-index:999}
.toast.show{transform:translateX(-50%) translateY(0)}

/* REUSE STYLES */
.fl label{display:block;font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--mu);margin-bottom:4px}
.fl input,.fl select,.fl textarea{width:100%;background:var(--s2);border:1px solid var(--bd);border-radius:9px;color:var(--tx);padding:10px 12px;font-family:'DM Sans',sans-serif;font-size:14px;outline:none}
.r2{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px}
.bsave{width:100%;background:var(--or);color:#fff;border:none;padding:15px;border-radius:11px;font-family:'Bebas Neue',sans-serif;font-size:21px;letter-spacing:3px;margin-top:20px}
</style>
</head>
<body>

<div id="ls">
  <div class="lbox">
    <div class="llogo">TEAM <span>RESOLVE</span></div>
    <div class="lsub">Intern Passbyggare</div>
    <div class="ng">
      <button class="nb" onclick="login('Liam')">🦅 Liam</button>
      <button class="nb" onclick="login('Navid')">🦁 Navid</button>
    </div>
  </div>
</div>

<div id="quote-screen"></div>

<div id="app">
  <div class="topbar">
    <div class="tlogo">TEAM <span>RESOLVE</span></div>
    <div class="tr">
      <div class="uchip" id="uchip">—</div>
      <button class="lout" onclick="logout()">✕</button>
    </div>
  </div>

  <div class="tabs">
    <div class="tab active" onclick="sw('bygg')">Bygg Pass</div>
    <div class="tab" onclick="sw('historik')">Historik</div>
    <div class="tab" onclick="sw('bibliotek')">Bibliotek</div>
  </div>

  <div class="page active" id="page-bygg">
    <div class="ph"><h2>NYTT PASS</h2><p>Anpassa övningar med instruktioner</p></div>
    
    <div class="r2">
      <div class="fl"><label>Passnamn</label><input type="text" id="pnamn" placeholder="Måndagspass"/></div>
      <div class="fl"><label>Målgrupp</label>
        <select id="ptarget" onchange="renderBuild()">
          <option value="ungdom">Ungdom</option>
          <option value="foretag">Företag</option>
        </select>
      </div>
    </div>

    <div id="build-sections"></div>
    <button class="bsave" onclick="saveWorkout()">SPARA PASS</button>
  </div>

  <div class="page" id="page-historik">
    <div class="ph"><h2>HISTORIK</h2><p>Tidigare pass och anteckningar</p></div>
    <div id="hist-list"></div>
  </div>

  <div class="page" id="page-bibliotek">
    <div class="ph"><h2>BIBLIOTEK</h2><p>Hela din övningsbank</p></div>
    <div id="lib-list"></div>
  </div>
</div>

<div id="toast" class="toast">Sparat!</div>

<script>
let user = '';
let workout = { start: [], main: [], end: [] };
let favorites = JSON.parse(localStorage.getItem('tr_favs') || '[]');
let lastUsed = JSON.parse(localStorage.getItem('tr_last') || '[]');

const LIB = [
  { id: '1', name: 'Löpning Teknik', desc: 'Fokus på stegisättning.', target: 'ungdom' },
  { id: '2', name: 'Styrkecirkel', desc: 'Hög intensitet.', target: 'foretag' },
  { id: '3', name: 'Rörlighet', desc: 'Dynamisk stretch.', target: 'ungdom' },
  { id: '4', name: 'Samarbete', desc: 'Team-övning.', target: 'foretag' }
];

function login(n) {
  user = n;
  document.getElementById('uchip').innerText = n.toUpperCase();
  document.getElementById('ls').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  renderBuild();
  renderLib();
  renderHist();
}

function logout() { location.reload(); }

function sw(t) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(p => p.classList.remove('active'));
  document.getElementById('page-' + t).classList.add('active');
  event.target.classList.add('active');
}

function toggleFav(id) {
  if (favorites.includes(id)) favorites = favorites.filter(f => f !== id);
  else favorites.push(id);
  localStorage.setItem('tr_favs', JSON.stringify(favorites));
  renderLib();
  renderBuild();
}

function renderBuild() {
  const sections = ['start', 'main', 'end'];
  let h = '';
  sections.forEach(s => {
    h += `<div style="margin:20px 0 10px; font-family:'Bebas Neue'; color:var(--or); letter-spacing:2px">${s.toUpperCase()}</div>`;
    workout[s].forEach((ex, idx) => {
      h += `
        <div class="oc">
          <div class="ot" onclick="this.parentElement.classList.toggle('open')">
            <div class="on">${idx+1}</div>
            <div class="onm">${ex.name}</div>
            <button class="star-btn ${favorites.includes(ex.id)?'active':''}" onclick="event.stopPropagation();toggleFav('${ex.id}')">★</button>
          </div>
          <div class="ob">
            <div class="odesc">${ex.desc}</div>
            <div class="extra-ins">
              <label>Extra Instruktion</label>
              <textarea placeholder="Lägg till specifika detaljer för detta pass..." oninput="workout['${s}'][${idx}].extra=this.value">${ex.extra||''}</textarea>
            </div>
            <button class="bsave" style="font-size:12px; padding:6px; margin-top:8px; background:var(--re)" onclick="workout['${s}'].splice(${idx},1);renderBuild()">Ta bort</button>
          </div>
        </div>`;
    });
    h += `<button class="bsave" style="font-size:14px; padding:10px; margin-top:5px; background:var(--s3); color:var(--mu); border:1px dashed var(--bd)" onclick="showSwap('${s}')">+ Lägg till övning</button>`;
  });
  document.getElementById('build-sections').innerHTML = h;
}

function showSwap(section) {
  const target = document.getElementById('ptarget').value;
  const filtered = LIB.filter(ex => ex.target === target);
  const favs = filtered.filter(ex => favorites.includes(ex.id));
  const recent = filtered.filter(ex => lastUsed.includes(ex.id)).slice(0,5);

  let h = `<div class="swap-dd">`;
  
  h += `<div class="qs-header">⭐ Favoriter</div>`;
  if (favs.length) favs.forEach(ex => h += `<div class="swap-item" onclick="addEx('${section}','${ex.id}')"><div class="swap-name">${ex.name}</div></div>`);
  else h += `<div style="padding:10px; font-size:11px; color:var(--mu)">Inga stjärnmärkta än</div>`;

  h += `<div class="qs-header">🕐 Senast använda</div>`;
  if (recent.length) recent.forEach(ex => h += `<div class="swap-item" onclick="addEx('${section}','${ex.id}')"><div class="swap-name">${ex.name}</div></div>`);
  else h += `<div style="padding:10px; font-size:11px; color:var(--mu)">Ingen historik</div>`;

  h += `<div class="qs-header">📚 Alla</div>`;
  filtered.forEach(ex => h += `<div class="swap-item" onclick="addEx('${section}','${ex.id}')"><div class="swap-name">${ex.name}</div></div>`);
  
  h += `</div>`;
  
  // Enkel modal-lösning för demo
  const m = document.createElement('div');
  m.className = 'mwrap';
  m.innerHTML = `<div class="mbox"><h3>Välj övning</h3>${h}<button class="bsave" onclick="this.parentElement.parentElement.remove()">STÄNG</button></div>`;
  document.body.appendChild(m);
}

function addEx(sec, id) {
  const ex = LIB.find(e => e.id === id);
  workout[sec].push({...ex, extra: ''});
  if (!lastUsed.includes(id)) {
    lastUsed.unshift(id);
    localStorage.setItem('tr_last', JSON.stringify(lastUsed.slice(0,10)));
  }
  document.querySelector('.mwrap').remove();
  renderBuild();
}

function renderLib() {
  let h = '';
  LIB.forEach(ex => {
    h += `
      <div class="oc">
        <div class="ot">
          <div class="onm">${ex.name} <small style="color:var(--mu)">(${ex.target})</small></div>
          <button class="star-btn ${favorites.includes(ex.id)?'active':''}" onclick="toggleFav('${ex.id}')">★</button>
        </div>
      </div>`;
  });
  document.getElementById('lib-list').innerHTML = h;
}

function saveWorkout() {
  const name = document.getElementById('pnamn').value || 'Namnlöst pass';
  const data = { name, workout, user, date: new Date().toLocaleDateString() };
  let hist = JSON.parse(localStorage.getItem('tr_history') || '[]');
  hist.unshift(data);
  localStorage.setItem('tr_history', JSON.stringify(hist));
  showToast();
  renderHist();
  sw('historik');
}

function renderHist() {
  let hist = JSON.parse(localStorage.getItem('tr_history') || '[]');
  let h = '';
  hist.forEach(p => {
    const icon = p.user === 'Liam' ? '🦅' : '🦁';
    h += `
      <div class="oc" style="padding:14px">
        <div class="note-banner">
          <div class="nb-icon">${icon}</div>
          <div class="nb-content">
            <div class="nb-name">${p.user.toUpperCase()}</div>
            <div class="nb-text">Reflektion: Riktigt bra energi på passet!</div>
          </div>
        </div>
        <div style="font-weight:700">${p.name}</div>
        <div style="font-size:10px; color:var(--mu)">${p.date}</div>
      </div>`;
  });
  document.getElementById('hist-list').innerHTML = h || '<div class="empty">Inga sparade pass än.</div>';
}

function showToast() {
  const t = document.getElementById('toast');
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}
</script>
</body>
</html>
